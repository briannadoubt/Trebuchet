name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [macos-26, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Compote dependency
        run: |
          cd ..
          git clone https://github.com/briannadoubt/compote.git compote

      - name: Setup Swift (Linux)
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Build
        run: swift build

      - name: Run Tests
        run: swift test --no-parallel --skip DynamoDBStateStoreIntegrationTests --skip SurrealDBStateStoreTests --skip SurrealDBIntegrationTests

  wasm-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Compote dependency
        run: |
          cd ..
          git clone https://github.com/briannadoubt/compote.git compote

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Install WASM SDK
        run: |
          swift sdk install \
            https://download.swift.org/swift-6.2.3-release/wasm-sdk/swift-6.2.3-RELEASE/swift-6.2.3-RELEASE_wasm.artifactbundle.tar.gz \
            --checksum 394040ecd5260e68bb02f6c20aeede733b9b90702c2204e178f3e42413edad2a

      - name: Build Trebuchet for WASM
        run: swift build --target Trebuchet --swift-sdk swift-6.2.3-RELEASE_wasm
