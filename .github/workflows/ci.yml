name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [macos-26, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Compote dependency
        run: |
          cd ..
          git clone https://github.com/briannadoubt/compote.git compote

      - name: Setup Swift (Linux)
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Build
        run: swift build

      - name: Run Tests
        run: swift test --no-parallel --skip DynamoDBStateStoreIntegrationTests --skip SurrealDBStateStoreTests --skip SurrealDBIntegrationTests

  wasm-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Compote dependency
        run: |
          cd ..
          git clone https://github.com/briannadoubt/compote.git compote

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Install WASM SDK
        run: |
          swift sdk install \
            https://download.swift.org/swift-6.2.1-release/wasm-sdk/swift-6.2.1-RELEASE/swift-6.2.1-RELEASE_wasm.artifactbundle.tar.gz \
            --checksum 482b9f95462b87bedfafca94a092cf9ec4496671ca13b43745097122d20f18af

      - name: Build Trebuchet for WASM
        run: swift build --target Trebuchet --swift-sdk swift-6.2.3-RELEASE_wasm

  wasm-e2e:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Compote dependency
        run: |
          cd ..
          git clone https://github.com/briannadoubt/compote.git compote

      - name: Setup Swiftly and Swift 6.2.3
        run: |
          brew install swiftly
          swiftly init --skip-install --assume-yes --quiet-shell-followup
          swiftly install 6.2.3
          swiftly use 6.2.3
          swiftly run swift --version

      - name: Install WASM SDK
        run: |
          swiftly run swift sdk install \
            https://download.swift.org/swift-6.2.3-release/wasm-sdk/swift-6.2.3-RELEASE/swift-6.2.3-RELEASE_wasm.artifactbundle.tar.gz \
            --checksum 394040ecd5260e68bb02f6c20aeede733b9b90702c2204e178f3e42413edad2a

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run WASM WebSocket E2E
        run: ./Tests/WasmE2E/run-wasm-websocket-e2e.sh
